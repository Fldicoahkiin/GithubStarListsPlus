name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Verify toolchain
        run: |
          node --version
          python3 --version

      - name: Run smoke test
        run: bash ./scripts/test-extension.sh

  package-artifacts:
    name: Package Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build installable bundles
        run: python3 ./scripts/build_artifacts.py

      - name: Write artifact summary
        run: |
          {
            echo '## Generated artifacts'
            echo
            find dist -maxdepth 2 -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI bundles
        uses: actions/upload-artifact@v4
        with:
          name: github-star-lists-plus-bundles-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
