name: Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Run smoke test
        run: bash ./scripts/test-smoke.sh
