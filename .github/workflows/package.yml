name: Package

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-artifacts:
    name: Package Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build installable bundles
        run: python3 ./scripts/build_artifacts.py

      - name: Validate packaged artifacts
        run: bash ./scripts/test-artifacts.sh

      - name: Write artifact summary
        run: |
          {
            echo '## Generated artifacts'
            echo
            find dist -maxdepth 2 -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-star-lists-plus-chrome-${{ github.run_number }}
          path: |
            dist/chrome-unpacked/
            dist/github-star-lists-plus-chrome-unpacked.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-star-lists-plus-firefox-${{ github.run_number }}
          path: |
            dist/firefox-unsigned/
            dist/github-star-lists-plus-firefox-unsigned.xpi
          if-no-files-found: error
          retention-days: 14

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-star-lists-plus-userscript-${{ github.run_number }}
          path: dist/github-star-lists-plus.user.js
          if-no-files-found: error
          retention-days: 14

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-star-lists-plus-metadata-${{ github.run_number }}
          path: |
            dist/checksums.txt
            dist/install-notes.txt
            dist/artifact-metadata.json
          if-no-files-found: error
          retention-days: 14
