<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub StarLists++</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>GitHub StarLists++</h1>
        <p>Minimal settings for stars pages.</p>
      </header>

      <section class="popup-section">
        <label class="popup-row" for="showStarDate">
          <span>
            <strong>Show exact starred time</strong>
            <small>Replace the native time slot with YYYY/MM/DD HH:mm.</small>
          </span>
          <span class="popup-switch">
            <input id="showStarDate" type="checkbox">
            <span class="popup-switch-slider" aria-hidden="true"></span>
          </span>
        </label>

        <label class="popup-row" for="hideGroupedInAll">
          <span>
            <strong>Hide grouped repositories in All view</strong>
            <small>Show only repositories that are still ungrouped.</small>
          </span>
          <span class="popup-switch">
            <input id="hideGroupedInAll" type="checkbox">
            <span class="popup-switch-slider" aria-hidden="true"></span>
          </span>
        </label>

        <label class="popup-row" for="showListBadges">
          <span>
            <strong>Show Ungrouped label</strong>
            <small>Show a single neutral label for repositories with no list.</small>
          </span>
          <span class="popup-switch">
            <input id="showListBadges" type="checkbox">
            <span class="popup-switch-slider" aria-hidden="true"></span>
          </span>
        </label>

        <label class="popup-row" for="autoOpenAfterStar">
          <span>
            <strong>Auto-open list menu after starring</strong>
            <small>Open the native list menu after a repository is starred.</small>
          </span>
          <span class="popup-switch">
            <input id="autoOpenAfterStar" type="checkbox">
            <span class="popup-switch-slider" aria-hidden="true"></span>
          </span>
        </label>

        <label class="popup-field" for="token">
          <span>
            <strong>GitHub token</strong>
            <small>Optional. Used for a higher API quota when resolving starred time.</small>
          </span>
          <input id="token" type="password" placeholder="ghp_xxx or fine-grained token">
        </label>
      </section>

      <div class="popup-actions">
        <button id="saveButton" type="button">Save</button>
        <span id="statusText" aria-live="polite"></span>
      </div>

      <footer class="popup-footer">
        <a href="https://github.com/Fldicoahkiin/GithubStarListsPlus" target="_blank" rel="noopener noreferrer">Source</a>
        <span>·</span>
        <a href="https://github.com/Fldicoahkiin/GithubStarListsPlus/issues" target="_blank" rel="noopener noreferrer">Issues</a>
      </footer>
    </main>

    <script src="./shared/base.js"></script>
    <script src="./shared/storage.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
